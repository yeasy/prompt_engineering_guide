name: Update Preview Publications

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: preview-publications
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run offline tests and book checks
        run: |
          python3 -m unittest discover -s tests -p 'test_*.py' -v
          python3 check_project_rules.py
      - name: Set up Chrome
        id: setupchrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2
        with:
          chrome-version: stable
      - name: Install fonts and PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra poppler-utils
      - name: Resolve latest mdPress release
        run: |
          url="$(curl -fsSL --retry 3 -o /dev/null -w '%{url_effective}' https://github.com/yeasy/mdPress/releases/latest)"
          version="${url##*/v}"
          test -n "$version" || { echo "could not resolve latest mdPress release"; exit 1; }
          echo "MDPRESS_VERSION=$version" >> "$GITHUB_ENV"
          echo "resolved mdPress $version"
      - name: Install mdPress (checksum-verified)
        run: |
          archive="$RUNNER_TEMP/mdpress_${MDPRESS_VERSION}_linux_amd64.tar.gz"
          curl -fsSL --retry 3 "https://github.com/yeasy/mdPress/releases/download/v${MDPRESS_VERSION}/mdpress_${MDPRESS_VERSION}_linux_amd64.tar.gz" -o "$archive"
          expected="$(curl -fsSL --retry 3 "https://github.com/yeasy/mdPress/releases/download/v${MDPRESS_VERSION}/checksums.txt" \
            | awk -v f="mdpress_${MDPRESS_VERSION}_linux_amd64.tar.gz" '$2==f {print $1}')"
          test -n "$expected" || { echo "no published checksum for mdpress_${MDPRESS_VERSION}_linux_amd64.tar.gz"; exit 1; }
          echo "${expected}  $archive" | sha256sum -c -
          tar xzf "$archive" -C "$RUNNER_TEMP" mdpress
          mkdir -p "$RUNNER_TEMP/bin"
          install -m 0755 "$RUNNER_TEMP/mdpress" "$RUNNER_TEMP/bin/mdpress"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      - name: Install verified Pandoc 3.5
        env:
          PANDOC_VERSION: "3.5"
          PANDOC_SHA256: "4f41d817d262ef3d17953a3e6e0fefddb971aa4f2f121544a9a86db449d945e1"
        run: |
          package="$RUNNER_TEMP/pandoc-${PANDOC_VERSION}-1-amd64.deb"
          curl -fsSL --retry 3 "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb" -o "$package"
          echo "${PANDOC_SHA256}  $package" | sha256sum -c -
          sudo dpkg -i "$package"
      - name: Install locked Mermaid CLI
        run: |
          PUPPETEER_SKIP_DOWNLOAD=true npm ci --prefix tools/mermaid --ignore-scripts
          echo "$GITHUB_WORKSPACE/tools/mermaid/node_modules/.bin" >> "$GITHUB_PATH"
      - name: Build preview PDF and HTML
        run: |
          mkdir -p dist
          title=$(python3 -c 'import json; print(json.load(open("book.json"))["title"])')
          mdpress build --format pdf --output dist/prompt_engineering_guide.pdf
          python3 tools/render_mermaid.py --book-dir . --svg-out "$RUNNER_TEMP/mermaid-svg" --strict
          python3 tools/build_html_reader.py --book-dir . --title "$title" --svg-dir "$RUNNER_TEMP/mermaid-svg" --out dist/prompt_engineering_guide.html
      - name: Verify preview publications
        run: |
          title=$(python3 -c 'import json; print(json.load(open("book.json"))["title"])')
          python3 tools/verify_artifacts.py --title "$title" --pdf dist/prompt_engineering_guide.pdf --html dist/prompt_engineering_guide.html --source-root . --checksums dist/SHA256SUMS
          (cd dist && sha256sum -c SHA256SUMS)
      - name: Upload verified preview bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: prompt-engineering-guide-preview
          path: dist/
          if-no-files-found: error

  publish:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Download verified preview bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: prompt-engineering-guide-preview
          path: dist
      - name: Recheck checksums
        run: (cd dist && sha256sum -c SHA256SUMS)
      - name: Write release notes
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA:0:7}"
          printf 'Auto-updated preview PDF and HTML reader from `%s` on branch `%s`.\n\n' \
            "$short_sha" "$GITHUB_REF_NAME" > dist/release-notes.md
          printf '%s\n' \
            "- Commit: https://github.com/${GH_REPO}/commit/${GITHUB_SHA}" \
            "- Run: https://github.com/${GH_REPO}/actions/runs/${GITHUB_RUN_ID}" \
            '' \
            'This mutable preview has no formal release provenance. Use a tagged release for attested artifacts.' \
            >> dist/release-notes.md
      - name: Synchronize mutable preview tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$GH_REPO" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then echo "Invalid GH_REPO" >&2; exit 1; fi
          if [[ ! "$GITHUB_SHA" =~ ^[0-9a-f]{40}$ ]]; then echo "Invalid GITHUB_SHA" >&2; exit 1; fi
          probe=$(mktemp -d)
          trap 'rm -rf "$probe"' EXIT
          set +e
          gh api --include --method GET "repos/${GH_REPO}/git/ref/tags/preview-pdf" >"$probe/response" 2>"$probe/error"
          probe_rc=$?
          set -e
          status=$(awk '$1 ~ /^HTTP\// && $2 ~ /^[0-9]{3}$/ { value=$2 } END { print value }' "$probe/response")
          if [[ $probe_rc -eq 0 && "$status" == "200" ]]; then
            gh api --silent --method PATCH "repos/${GH_REPO}/git/refs/tags/preview-pdf" --raw-field sha="$GITHUB_SHA" --field force=true
          elif [[ $probe_rc -eq 1 && "$status" == "404" ]]; then
            gh api --silent --method POST "repos/${GH_REPO}/git/refs" --raw-field ref="refs/tags/preview-pdf" --raw-field sha="$GITHUB_SHA"
          else
            cat "$probe/response" >&2
            cat "$probe/error" >&2
            echo "Preview tag lookup failed (exit=$probe_rc HTTP=${status:-unknown})" >&2
            exit 1
          fi
      - name: Create or update preview release
        shell: bash
        run: |
          set -euo pipefail
          error=$(mktemp)
          trap 'rm -f "$error"' EXIT
          set +e
          gh release view preview-pdf >/dev/null 2>"$error"
          release_rc=$?
          set -e
          if [[ $release_rc -eq 0 ]]; then
            gh release edit preview-pdf --title "Latest Preview Publications" --notes-file dist/release-notes.md --prerelease
          elif [[ $release_rc -eq 1 && "$(tr -d '\r' < "$error")" == "release not found" ]]; then
            gh release create preview-pdf --title "Latest Preview Publications" --notes-file dist/release-notes.md --prerelease --latest=false --verify-tag
          else
            cat "$error" >&2
            echo "Preview release lookup failed (exit=$release_rc)" >&2
            exit 1
          fi
      - name: Replace preview assets
        run: |
          gh release upload preview-pdf dist/prompt_engineering_guide.pdf dist/prompt_engineering_guide.html dist/SHA256SUMS --clobber
